# WT-SIM — Netlify Deploy Config
# App estática single-file, sem build step

[build]
  publish = "."
  command = ""

# Redireciona / para o simulador
[[redirects]]
  from = "/"
  to   = "/winchsim.html"
  status = 200

# Headers de segurança compatíveis com CDN (Three.js via jsdelivr)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache longo para assets JS externos (via service worker / proxy não aplicável aqui)
[[headers]]
  for = "/winchsim.html"
  [headers.values]
    Cache-Control = "no-cache"
