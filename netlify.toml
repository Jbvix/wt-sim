# WT-SIM — Netlify Deploy Config
# App estática modular (ES Modules nativos), sem build step

[build]
  publish = "dist"
  command = "npm run build"

# Retrocompatibilidade: winchsim.html continua acessível diretamente
[[redirects]]
  from   = "/winchsim"
  to     = "/winchsim.html"
  status = 200

# Cabeçalhos de segurança (compatíveis com CDN — Three.js via jsdelivr)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
